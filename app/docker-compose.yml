version: "3.9"

services:
  app:
    build:
      context: .
      args:
        DEPLOY_TIME: "local-dev"

    ports:
      - "5000:5000"

    environment:
      APP_VERSION: "dev"
      AWS_REGION: "us-east-1"
      ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3